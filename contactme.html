<!doctype html>
<html lang="ar" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Vaishnavi</title>

    <!-- Bootstrap RTL CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
      integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW"
      crossorigin="anonymous"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- Google Fonts: Playfair Display -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <!-- Custom Style -->
    <style>
      body {
        font-family: "Playfair Display", serif;
        background-color: #f8f9fa;
      }

      .contact-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        padding: 2rem;
        background: #ffffff;
      }

      h1 {
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #212529;
      }

      p {
        color: #495057;
      }

      .btn-custom {
        border-radius: 50px;
        padding: 0.5rem 2rem;
        font-weight: 600;
      }

      .btn-send {
        background: #28a745;
        color: #fff;
        border: none;
      }

      .btn-send:hover {
        background: #218838;
      }

      .btn-reset {
        background: #6c757d;
        color: #fff;
        border: none;
      }

      .btn-reset:hover {
        background: #5a6268;
      }

      .form-control {
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="./index.html">
          <i class="fa-solid fa-user me-2"></i> Vaishnavi Tripathi
        </a>
      </div>
    </nav>

    <!-- Contact Section -->
    <div class="container my-5">
      <div class="text-center mb-4">
        <h1>Contact Me</h1>
        <p>Have a question or want to collaborate? Fill out the form below!</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
          <div class="contact-card">
            <form
              action="mailto:vaishnavi226@example.com"
              method="post"
              enctype="text/plain"
            >
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  name="Name"
                  placeholder="Your Name"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="Email"
                  placeholder="your.email@example.com"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea
                  class="form-control"
                  id="message"
                  name="Message"
                  rows="5"
                  placeholder="Write your message here..."
                  required
                ></textarea>
              </div>

              <div class="d-flex justify-content-center gap-3 mt-4">
                <button type="submit" class="btn btn-custom btn-send">
                  <i class="fa-solid fa-paper-plane me-1"></i> Send Message
                </button>
                <button type="reset" class="btn btn-custom btn-reset">
                  <i class="fa-solid fa-eraser me-1"></i> Reset
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
