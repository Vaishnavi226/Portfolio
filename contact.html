<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Vaishnavi Tripathi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap");

      :root {
        --bg: #f6f3ff;
        --bg2: #fffdfd;
        --text: #1e1b2d;
        --muted: #6d6785;
        --card: rgba(255, 255, 255, 0.7);
        --border: rgba(124, 58, 237, 0.14);
        --accent: #7c3aed;
        --accent2: #ec4899;
        --shadow: 0 14px 40px rgba(124, 58, 237, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, var(--bg), var(--bg2));
        min-height: 100vh;
        color: var(--text);
      }

      h1,
      .navbar-brand {
        font-family: "Playfair Display", serif;
      }

      .custom-navbar {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
      }

      .navbar-brand {
        font-weight: 700;
        color: var(--text);
      }

      .contact-wrap {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
      }

      .contact-card {
        width: 100%;
        max-width: 760px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(18px);
        border-radius: 28px;
        padding: 36px;
        box-shadow: var(--shadow);
      }

      .contact-card h1 {
        font-size: 2.7rem;
        margin-bottom: 10px;
      }

      .contact-card p {
        color: var(--muted);
        line-height: 1.8;
      }

      .form-label {
        font-weight: 600;
      }

      .form-control {
        border-radius: 16px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.75);
      }

      .form-control:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 0.2rem rgba(124, 58, 237, 0.15);
      }

      .primary-btn,
      .secondary-btn {
        border: none;
        border-radius: 999px;
        padding: 12px 24px;
        font-weight: 600;
      }

      .primary-btn {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: white;
      }

      .secondary-btn {
        background: #1f1b2d;
        color: white;
      }

      .primary-btn:hover,
      .secondary-btn:hover {
        transform: translateY(-3px);
      }

      @media (max-width: 576px) {
        .contact-card {
          padding: 24px;
          border-radius: 22px;
        }

        .contact-card h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container">
        <a class="navbar-brand" href="index.html">Vaishnavi Tripathi</a>
      </div>
    </nav>

    <section class="contact-wrap">
      <div class="contact-card">
        <div class="text-center mb-4">
          <h1>Let’s Connect</h1>
          <p>
            Have a question, opportunity, or collaboration idea? Send me a
            message below.
          </p>
        </div>

        <form
          action="mailto:vaishnavi226@example.com"
          method="post"
          enctype="text/plain"
        >
          <div class="mb-3">
            <label for="name" class="form-label">Your Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="Name"
              placeholder="Enter your name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Your Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="Email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-4">
            <label for="message" class="form-label">Your Message</label>
            <textarea
              class="form-control"
              id="message"
              name="Message"
              rows="6"
              placeholder="Write your message here..."
              required
            ></textarea>
          </div>

          <div class="d-flex gap-3 flex-wrap justify-content-center">
            <button type="submit" class="primary-btn">
              <i class="fa-solid fa-paper-plane me-2"></i>Send Message
            </button>
            <button type="reset" class="secondary-btn">
              <i class="fa-solid fa-rotate-left me-2"></i>Reset
            </button>
          </div>
        </form>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
